theme = "tokyonight"

[editor]
line-number = "relative"
mouse = true
cursorline = true
color-modes = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.statusline]
left = ["mode", "spinner"]
center = ["file-name", "position-percentage"]
right = ["diagnostics", "selections", "file-line-ending", "file-type"]
separator = "│"

[editor.lsp]
display-messages = true

[editor.auto-pairs]
"<" = ">"
"¿" = "?"
"¡" = "!"

[editor.indent-guides]
render = true

[keys.normal]
C-s = ":w"
